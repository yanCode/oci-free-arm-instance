name: Try to Create OCI VM
# It will run every 5 minutes.
on:
  schedule:
    - cron: "*/5 * * * *"
  # Allows you to manually run this workflow from the Actions tab
  workflow_dispatch:
env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: ${{ secrets.OCI_AD_NAME }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION || 'us-phoenix-1' }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
  SUPPRESS_LABEL_WARNING: "True"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI and Try to Create VM
        id: create_vm
        # This forces the job to succeed so the cache will save.
        continue-on-error: true
        shell: bash
        run: |
          set -u

          log_file="$(mktemp)"

          run_and_log() {
            echo "+ $*" | tee -a "$log_file"
            "$@" 2>&1 | tee -a "$log_file"
            return "${PIPESTATUS[0]}"
          }

          fail_with_log() {
            echo "$1" | tee -a "$log_file"
            echo "log_data<<EOF" >> "$GITHUB_OUTPUT"
            cat "$log_file" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 1
          }

          pip install oci-cli

          required_vars=(
            COMPARTMENT_ID
            IMAGE_ID
            SUBNET_ID
            AD_NAME
            OCI_CLI_REGION
            OCI_CLI_USER
            OCI_CLI_TENANCY
            OCI_CLI_FINGERPRINT
            OCI_CLI_KEY_CONTENT
            SSH_PUBLIC_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name}" ]]; then
              fail_with_log "Missing required GitHub secret/env: ${var_name}"
            fi
          done

          mkdir -p ~/.oci
          printf '%s\n' "$OCI_CLI_KEY_CONTENT" | sed 's/\r$//' > ~/.oci/oci_api_key.pem
          if ! grep -q '^OCI_API_KEY$' ~/.oci/oci_api_key.pem; then
            echo "OCI_API_KEY" >> ~/.oci/oci_api_key.pem
          fi
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_CLI_USER}
          tenancy=${OCI_CLI_TENANCY}
          fingerprint=${OCI_CLI_FINGERPRINT}
          key_file=${HOME}/.oci/oci_api_key.pem
          region=${OCI_CLI_REGION}
          EOF
          chmod 600 ~/.oci/config

          printf '%s\n' "$SSH_PUBLIC_KEY" > /home/runner/my_ssh_key.pub

          {
            echo "OCI auth preflight:"
            echo "- region: ${OCI_CLI_REGION}"
            echo "- user OCID prefix: ${OCI_CLI_USER:0:18}..."
            echo "- tenancy OCID prefix: ${OCI_CLI_TENANCY:0:21}..."
            echo "- fingerprint: ${OCI_CLI_FINGERPRINT}"
          } | tee -a "$log_file"

          if ! run_and_log oci os ns get --auth api_key; then
            fail_with_log "OCI authentication preflight failed. Check OCI_CLI_KEY_CONTENT, OCI_CLI_FINGERPRINT, OCI_CLI_USER, OCI_CLI_TENANCY, and OCI_CLI_REGION."
          fi

          # Run the command, capture ALL output, and use '|| true' to prevent the script from exiting early.
          OCI_OUTPUT=$(oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AD_NAME" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --subnet-id "$SUBNET_ID" \
            --image-id "$IMAGE_ID" \
            --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
            --assign-public-ip true \
            --display-name "coolify-vm" \
            --boot-volume-size-in-gbs 200 2>&1 || true)

          echo "$OCI_OUTPUT" | tee -a "$log_file"

          # Store the log as a GitHub step output
          echo "log_data<<EOF" >> $GITHUB_OUTPUT
          cat "$log_file" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Check the log content for an error string.
          if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
            echo "Success! 'PROVISIONING' state found in output."
            exit 0
          else
            echo "Error: Success string not found in OCI output. Failing the step."
            exit 1
          fi

      - name: Send Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1.15.4
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "OCI VM Status: ${{ steps.create_vm.outcome }}"
          status: ${{ steps.create_vm.outcome }}
          color: ${{ steps.create_vm.outcome == 'success' && '0x28a745' || '0xdc3545' }}
          description: |
            Attempt to create A1.Flex VM.
            **Status:** `${{ steps.create_vm.outcome }}`

            **Log Output:**
            ```json
            ${{ steps.create_vm.outputs.log_data }}
            ```
